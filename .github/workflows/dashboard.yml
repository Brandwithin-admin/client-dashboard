name: Morning dashboard update (Codex)

on:
  schedule:
    # 21:30 UTC Sun-Thu = 7:30am AEST Mon-Fri
    - cron: "30 21 * * 0-4"
  workflow_dispatch: {}

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/update-dashboard.md
          sandbox: danger-full-access
          output-file: codex-output.md
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}

      - name: Commit and push updated dashboard
        run: |
          git config user.name "codex-dashboard-bot"
          git config user.email "hq@brandwithin.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Dashboard update: $(date -u +%Y-%m-%d)"
          git push
